name: Bug report
description: Something isn't working the way it should
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for the report! Please fill in the details below.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, what did you expect, and what happened instead?
      placeholder: When I press `r` on the backend service, ...
    validations:
      required: true
  - type: textarea
    id: config
    attributes:
      label: Your .devspanner/config.yaml
      description: Redact anything sensitive. This is rendered as YAML.
      render: yaml
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: devspanner version
      description: Output of `devspanner -v`.
      placeholder: devspanner 0.1.0
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS / distro
      placeholder: Arch Linux (kernel 7.0.12)
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or output
      description: Any error text or captured log content.
      render: shell
    validations:
      required: false
